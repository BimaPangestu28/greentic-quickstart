name: Publish Packs to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packs/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish-app-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/greentic-quickstart" >> $GITHUB_ENV

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push quickstart-app
        run: |
          cd apps/quickstart-app/dist
          oras push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}/quickstart-app:latest \
            --artifact-type application/vnd.greentic.gtpack.v1+zip \
            quickstart-app.gtpack:application/vnd.greentic.gtpack.v1+zip
          oras push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}/quickstart-app:${{ github.sha }} \
            --artifact-type application/vnd.greentic.gtpack.v1+zip \
            quickstart-app.gtpack:application/vnd.greentic.gtpack.v1+zip

      - name: Push component-msg2events
        run: |
          cd packs/component-msg2events/dist
          oras push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}/component-msg2events:latest \
            --artifact-type application/vnd.greentic.gtpack.v1+zip \
            component-msg2events.gtpack:application/vnd.greentic.gtpack.v1+zip

      - name: Push component-events2msg
        run: |
          cd packs/component-events2msg/dist
          oras push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}/component-events2msg:latest \
            --artifact-type application/vnd.greentic.gtpack.v1+zip \
            component-events2msg.gtpack:application/vnd.greentic.gtpack.v1+zip

      - name: Push component-http
        run: |
          cd packs/component-http/dist
          oras push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX_LC }}/component-http:latest \
            --artifact-type application/vnd.greentic.gtpack.v1+zip \
            component-http.gtpack:application/vnd.greentic.gtpack.v1+zip
